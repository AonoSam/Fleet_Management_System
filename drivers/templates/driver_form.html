{% extends 'base.html' %}

{% block content %}
<h2>{% if driver %}Edit{% else %}Add{% endif %} Driver</h2>

<form method="POST">
    {% csrf_token %}

    <!-- USER DROPDOWN -->
    <select name="user_id" class="form-control mb-2" required>
        <option value="">-- Select Driver User --</option>
        {% for user in users %}
            <option value="{{ user.id }}"
                {% if driver and driver.user.id == user.id %}selected{% endif %}>
                {{ user.username }}
            </option>
        {% endfor %}
    </select>

    <!-- LICENSE -->
    <input type="text" name="license_number" placeholder="License Number"
           class="form-control mb-2"
           value="{{ driver.license_number|default:'' }}" required>

    <!-- PHONE -->
    <input type="text" name="phone" placeholder="Phone"
           class="form-control mb-2"
           value="{{ driver.phone|default:'' }}" required>

    <!-- VEHICLE DROPDOWN -->
    <select name="assigned_vehicle" class="form-control mb-2">
        <option value="">-- Assign Vehicle --</option>
        {% for v in vehicles %}
            <option value="{{ v.id }}"
                {% if driver and driver.assigned_vehicle and driver.assigned_vehicle.id == v.id %}selected{% endif %}>
                {{ v.number_plate }}
            </option>
        {% endfor %}
    </select>

    <button class="btn btn-success">Save</button>

    <!-- BACK BUTTON -->
    <a href="{% url 'driver_list' %}" class="btn btn-secondary">
        Back
    </a>
</form>
{% endblock %}
