{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="form-card">
  <div class="form-card-head">
    <h5>📅 Add Maintenance Schedule</h5>
    <a href="{% url 'schedule_list' %}" class="btn btn-secondary btn-sm">← Back</a>
  </div>

  <form method="POST">
    {% csrf_token %}
    <div class="form-card-body">

      <div class="field-group">
        <label>Select Vehicle *</label>
        <select name="vehicle" required>
          <option value="">— Select Vehicle —</option>
          {% for v in vehicles %}
            <option value="{{ v.id }}">{{ v.number_plate }} — {{ v.model }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="field-group">
        <label>Service Date *</label>
        <input type="date" name="service_date" required>
      </div>

      <div class="field-group">
        <label>Description *</label>
        <textarea name="description" rows="3"
          placeholder="e.g. Oil change, Brake inspection, Engine service"
          required></textarea>
      </div>

    </div>
    <div class="form-actions">
      <a href="{% url 'schedule_list' %}" class="btn btn-secondary btn-sm">Cancel</a>
      <button type="submit" class="btn btn-primary btn-sm">Save Schedule</button>
    </div>
  </form>
</div>

{% endblock %}
