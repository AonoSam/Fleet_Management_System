{% extends 'base.html' %}

{% block content %}
<h2>Cost Report (Maintenance & Repairs)</h2>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Vehicle</th>
            <th>Issue</th>
            <th>Cost</th>
            <th>Date</th>
        </tr>
    </thead>

    <tbody>
        {% for c in costs %}
        <tr>
            <td>{{ c.vehicle }}</td>
            <td>{{ c.issue }}</td>
            <td>KSh {{ c.cost }}</td>
            <td>{{ c.repaired_on }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
