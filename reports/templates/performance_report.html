{% extends 'base.html' %}

{% block content %}
<h2>Driver Performance Report</h2>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Driver</th>
            <th>Trips</th>
            <th>Total Collections</th>
            <th>Score</th>
        </tr>
    </thead>

    <tbody>
        {% for r in report %}
        <tr>
            <td>{{ r.driver.user.username }}</td>
            <td>{{ r.trips }}</td>
            <td>KSh {{ r.total_collections }}</td>
            <td>{{ r.score }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
