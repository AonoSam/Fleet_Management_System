{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Add Maintenance Schedule</h2>

<div class="card p-4 shadow-sm">

    <form method="POST">
        {% csrf_token %}

        <!-- 🔹 VEHICLE -->
        <div class="mb-3">
            <label class="form-label">Select Vehicle</label>
            <select name="vehicle" class="form-control" required>
                <option value="">-- Select Vehicle --</option>
                {% for v in vehicles %}
                    <option value="{{ v.id }}">
                        {{ v.number_plate }} - {{ v.model }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- 🔹 SERVICE DATE -->
        <div class="mb-3">
            <label class="form-label">Service Date</label>
            <input type="date" name="service_date" class="form-control" required>
        </div>

        <!-- 🔹 DESCRIPTION -->
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" 
                      class="form-control"
                      rows="3"
                      placeholder="e.g Oil change, Brake inspection, Engine service"
                      required></textarea>
        </div>

        <!-- 🔹 ACTIONS -->
        <button class="btn btn-success">
            Save Schedule
        </button>

        <a href="{% url 'schedule_list' %}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
