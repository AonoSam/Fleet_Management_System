{% extends 'base.html' %}

{% block content %}

<h2>Create Loan</h2>

<form method="POST">
    {% csrf_token %}

    <!-- DRIVER SELECTION -->
    <label>Driver</label>
    <select name="driver" required>
        <option value="">-- Select Driver --</option>
        {% for d in drivers %}
            <option value="{{ d.id }}">
                {{ d }}
            </option>
        {% endfor %}
    </select>

    <br><br>

    <!-- AMOUNT -->
    <label>Amount</label>
    <input type="number" name="amount" step="0.01" required>

    <br><br>

    <!-- REASON -->
    <label>Reason</label>
    <textarea name="reason" rows="4" required></textarea>

    <br><br>

    <!-- SUBMIT -->
    <button type="submit">Submit Loan</button>

    <a href="{% url 'loan_list' %}">Cancel</a>

</form>

{% endblock %}
