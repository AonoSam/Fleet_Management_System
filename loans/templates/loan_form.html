{% extends 'base.html' %}

{% block content %}

<h2>Issue Loan</h2>

<div class="card p-4">

    <form method="POST">
        {% csrf_token %}

        <!-- DRIVER -->
        <div class="mb-3">
            <label class="form-label">Select Driver</label>
            <select name="driver" class="form-control" required>
                <option value="">-- Choose Driver --</option>
                {% for d in drivers %}
                    <option value="{{ d.id }}">{{ d.username }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- AMOUNT -->
        <div class="mb-3">
            <label class="form-label">Loan Amount</label>
            <input type="number" step="0.01" name="amount" class="form-control" required>
        </div>

        <!-- PURPOSE -->
        <div class="mb-3">
            <label class="form-label">Purpose</label>
            <input type="text" name="purpose" class="form-control" placeholder="e.g Fuel, Repair, Emergency" required>
        </div>

        <!-- INTEREST -->
        <div class="mb-3">
            <label class="form-label">Interest Rate (%)</label>
            <input type="number" step="0.01" name="interest_rate" class="form-control" value="0">
        </div>

        <!-- DUE DATE -->
        <div class="mb-3">
            <label class="form-label">Due Date</label>
            <input type="date" name="due_date" class="form-control">
        </div>

        <!-- BUTTONS -->
        <button type="submit" class="btn btn-success">
            Issue Loan
        </button>

        <a href="{% url 'loan_list' %}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
